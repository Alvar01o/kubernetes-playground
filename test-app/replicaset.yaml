apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: test-app-rs
spec:
  replicas: 2
  selector:
    matchLabels:
      app: test-app
  template:
    metadata:
      labels:
        app: test-app
    spec:
      containers:
        - name: test-app
          image: test-app:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
